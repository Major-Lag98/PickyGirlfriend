<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Roulette</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { position: relative; width: 90vw; max-width: 500px; margin-top: 50px; }
        canvas { width: 100%; border-radius: 50%; box-shadow: 0 10px 30px rgba(0,0,0,0.2); background: white; }
        #spin-btn { margin-top: 30px; padding: 15px 40px; font-size: 1.5rem; cursor: pointer; background: #ff4757; color: white; border: none; border-radius: 50px; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4); transition: transform 0.1s; }
        #spin-btn:active { transform: scale(0.95); }
        #result { margin-top: 20px; font-size: 1.8rem; font-weight: bold; color: #2f3542; min-height: 2rem; }
        .arrow { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 30px solid #2f3542; z-index: 10; }
    </style>
</head>
<body>

    <h1>Where should we eat?</h1>
    <div class="container">
        <div class="arrow"></div>
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
    </div>
    <button id="spin-btn">SPIN THE WHEEL!</button>
    <div id="result"></div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spin-btn');
        const resultDiv = document.getElementById('result');

        let restaurants = [];
        let currentRotation = 0;
        let isSpinning = false;

        // 1. Fetch and Parse CSV
        async function loadRestaurants() {
            try {
                const response = await fetch('restaurants.csv');
                const text = await response.text();
                restaurants = text.split('\n').map(r => r.trim()).filter(r => r.length > 0);
                drawWheel();
            } catch (err) {
                resultDiv.innerText = "Error loading restaurants.csv!";
            }
        }

        // 2. Draw the Wheel
        function drawWheel() {
            const numSegments = restaurants.length;
            const arc = (2 * Math.PI) / numSegments;
            ctx.clearRect(0, 0, 500, 500);

            restaurants.forEach((name, i) => {
                const angle = i * arc + currentRotation;
                ctx.beginPath();
                ctx.fillStyle = `hsl(${(i * 360) / numSegments}, 70%, 60%)`;
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 250, angle, angle + arc);
                ctx.fill();
                ctx.stroke();

                // Add Text
                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 18px Arial";
                ctx.fillText(name, 230, 10);
                ctx.restore();
            });
        }

        // 3. Spin Logic
        spinBtn.addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;
            resultDiv.innerText = "Spinning...";

            const extraSpins = 5 + Math.random() * 5; // Rotate 5-10 times
            const targetRotation = currentRotation + (extraSpins * Math.PI * 2);
            const startTime = performance.now();
            const duration = 4000; // 4 seconds

            function animate(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // Ease out cubic function for smooth stop
                const easeOut = 1 - Math.pow(1 - progress, 3);
                currentRotation = targetRotation * easeOut;

                drawWheel();

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    isSpinning = false;
                    determineWinner();
                }
            }
            requestAnimationFrame(animate);
        });

        function determineWinner() {
            console.log(restaurants);
            const numSegments = restaurants.length;
            const arc = (2 * Math.PI) / numSegments;
            
            // Normalize rotation to 0-2PI
            let normalizedRotation = currentRotation % (Math.PI * 2);
            
            // Arrow points upward at 3π/2 (in canvas coordinates where Y increases downward)
            // Find which segment contains the arrow angle
            let diff = (3 * Math.PI / 2 - normalizedRotation + Math.PI * 2) % (Math.PI * 2);
            const index = Math.floor(diff / arc) % numSegments;
            
            // index + 1 because 
            resultDiv.innerText = `You should eat at: ${restaurants[index]}!`;
        }

        loadRestaurants();
    </script>
</body>
</html>
